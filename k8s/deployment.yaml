apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-tasks-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: brain-tasks
  template:
    metadata:
      labels:
        app: brain-tasks
    spec:
      containers:
        - name: brain-tasks
          image: us-central1-docker.pkg.dev/astute-ace-286718/docker-repo/brain-tasks-app:latest
          ports:
            - containerPort: 80

